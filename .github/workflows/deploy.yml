name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Node.js
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests
    - name: Run tests
      run: npm test

    # 5. Build Docker image
    - name: Build Docker image
      run: docker build -t node-ci-cd .

    # 6. Login to DockerHub
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Tag image
    - name: Tag Docker image
      run: docker tag node-ci-cd ${{ secrets.DOCKER_USERNAME }}/node-ci-cd:latest

    # 8. Push image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/node-ci-cd:latest

    # 9. Deploy (example: remote server via SSH)
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/node-ci-cd:latest
          docker stop node-ci-cd || true
          docker rm node-ci-cd || true
          docker run -d -p 3000:3000 --name node-ci-cd ${{ secrets.DOCKER_USERNAME }}/node-ci-cd:latest