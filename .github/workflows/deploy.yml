name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Node.js
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests
    - name: Run tests
      run: npm test

    # 5. Build Docker image
    - name: Build Docker image
      run: docker build -t nodejs-api .

    # 6. Login to DockerHub
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Tag image
    - name: Tag Docker image
      run: docker tag nodejs-api ${{ secrets.DOCKER_USERNAME }}/nodejs-api:latest

    # 8. Push image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-api:latest

    # 9. Deploy (example: remote server via SSH)
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/nodejs-api:latest
          docker stop nodejs-api || true
          docker rm nodejs-api || true
          docker run -d -p 8080:8080 --name nodejs-api ${{ secrets.DOCKER_USERNAME }}/nodejs-api:latest